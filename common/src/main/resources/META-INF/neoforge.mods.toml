
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://discord.gg/gV3jYaEtDa"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
	config="warbornrenewed.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neoforge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="geckolib"
type="required"
versionRange="[4.7,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="curios"
type="optional"
versionRange="[9.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="tacz"
type="optional"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
